# Fly.io config — `fly launch --copy-config` then `fly deploy`.
#
# Ships in demo mode (seeded ledgers, fake mentor). For the real mentor:
#   fly secrets set OPENAI_API_KEY=sk-...
# and remove LLM_FAKE_RESPONSE below (the fake takes precedence).
app = "kingdom-come"
primary_region = "sjc"

[build]

[env]
  KC_DEMO_SEED = "1"
  LLM_FAKE_RESPONSE = "Walk gently into this week. What you named is worth one more honest paragraph."

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
