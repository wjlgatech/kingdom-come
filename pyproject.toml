[project]
name = "seminary-formation-platform"
version = "0.7.0"
description = "V7 backend for predictive formation, adaptive curriculum, outcomes, and class orchestration."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "pydantic>=2",
    "sqlalchemy>=2",
    "uvicorn[standard]>=0.30",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.27",
    "playwright>=1.45",
    "pytest>=8",
    "pytest-playwright>=0.5",
]

[tool.setuptools.packages.find]
include = ["backend*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
